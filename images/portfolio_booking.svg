<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Sports booking platform mockup">
  <defs>
    <linearGradient id="book-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="book-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="12" fill="url(#book-bg)"/>
  <rect x="32" y="32" width="736" height="56" rx="8" fill="#1e293b"/>
  <rect x="52" y="50" width="140" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="620" y="44" width="120" height="32" rx="6" fill="url(#book-accent)" opacity="0.9"/>
  <rect x="32" y="108" width="736" height="360" rx="8" fill="#1e293b" stroke="rgba(255,255,255,0.08)"/>
  <text x="52" y="148" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Select a time slot</text>
  <rect x="52" y="168" width="100" height="48" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="102" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">6 AM</text>
  <rect x="164" y="168" width="100" height="48" rx="6" fill="rgba(6,182,212,0.2)" stroke="#06b6d4"/>
  <text x="214" y="198" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="13" font-weight="600">7 AM</text>
  <rect x="276" y="168" width="100" height="48" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="326" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">8 AM</text>
  <rect x="388" y="168" width="100" height="48" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="438" y="198" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="13">9 AM</text>
  <rect x="52" y="240" width="696" height="1" fill="rgba(255,255,255,0.08)"/>
  <rect x="52" y="268" width="320" height="160" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
  <text x="72" y="300" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Turf A &bull; Morning Slot</text>
  <text x="72" y="328" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">7:00 AM - 8:00 AM &#x20B9; 1800</text>
  <rect x="72" y="360" width="140" height="36" rx="6" fill="url(#book-accent)"/>
  <text x="142" y="383" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Pay via UPI</text>
  <rect x="400" y="268" width="348" height="160" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.25)"/>
  <text x="420" y="300" fill="#10b981" font-family="system-ui,sans-serif" font-size="14" font-weight="600">&#10003; Booking confirmed</text>
  <text x="420" y="328" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">SMS sent &bull; Razorpay receipt attached</text>
</svg>
